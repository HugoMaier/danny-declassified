<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Danny Declassified</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="description" content="Berichte, Analysen und Einordnungen — von Danny Declassified." />
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Danny Declassified" />
  <meta property="og:description" content="Berichte, Analysen und Einordnungen — von Danny Declassified." />
  <meta property="og:url"         content="https://hugomaier.github.io/danny-declassified/" />
  <link rel="alternate" hreflang="de" href="https://hugomaier.github.io/danny-declassified/" />
  <link rel="alternate" hreflang="en" href="https://hugomaier.github.io/danny-declassified/en/" />
</head>

<body>
  <header class="site-header">
    <div class="wrap header-row">
      <div class="brand">
        <div class="brand__logo">DD</div>
        <div>
          <h1 class="brand__title">Danny Declassified</h1>
          <p class="brand__tagline">Berichte, Analysen und Einordnungen.</p>
        </div>
      </div>

      <nav class="nav">
        <a href="./index.html" class="nav__link nav__link--active">Übersicht</a>
        <a href="./dossiers.html" class="nav__link">Dossiers</a>
        <span class="nav__lang"><a href="./index.html" class="nav__link nav__link--active nav__link--lang">DE</a><span
            class="nav__lang-sep">|</span><a href="./en/" class="nav__link nav__link--lang">EN</a></span>
      </nav>
    </div>
  </header>

  <main class="wrap layout">
    <section class="main">
      <div class="hero">
        <div>
          <h2 class="hero__title">Aktuelles</h2>
          <p class="hero__sub">Neueste Beiträge von Danny Declassified</p>
        </div>
        <div class="search-row">
          <input id="searchInput" class="search__input" placeholder="Beiträge suchen…" />
          <button id="searchClear" class="search-clear" style="display:none" aria-label="Suche zurücksetzen">✕</button>
        </div>
      </div>

      <div id="categoryNav" class="category-nav"></div>

      <div id="postsGrid" class="posts-feed"></div>
      <p id="emptyState" class="muted hidden">Keine Artikel gefunden.</p>
    </section>

    <aside class="sidebar">
      <div class="card">
        <h3 class="card__title">Neueste</h3>
        <ol id="trendingList" class="list"></ol>
      </div>

      <div class="card">
        <h3 class="card__title">Über</h3>
        <p class="muted">
          Wundert sich einfach über die Welt. Meistens mehr Fragen als Antworten.
        </p>
      </div>
    </aside>
  </main>

  <footer class="wrap footer">
    <span class="muted">© <span id="year"></span> Danny Declassified</span>
    <nav class="footer-nav"><a href="./impressum.html" class="footer-link">Impressum</a></nav>
  </footer>

  <script src="./main.js"></script>
  <button id="scrollTop" class="scroll-top" aria-label="Nach oben">↑</button>
