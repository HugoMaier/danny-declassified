<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Danny Declassified — Article</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-row">
      <div class="brand">
        <div class="brand__logo">DD</div>
        <div>
          <h1 class="brand__title">Danny Declassified</h1>
          <p class="brand__tagline">Reports, stories, and updates — in English.</p>
        </div>
      </div>

      <nav class="nav">
        <a href="./index.html" class="nav__link">Home</a>
        <span class="nav__lang"><a id="deLink" href="../" class="nav__link nav__link--lang">DE</a><span class="nav__lang-sep">|</span><a href="./index.html" class="nav__link nav__link--active nav__link--lang">EN</a></span>
      </nav>
    </div>
  </header>

  <main class="wrap post">
    <a class="back" href="./index.html">← Back to Home</a>

    <article class="article card">
      <header class="article__header">
        <h2 id="postTitle" class="article__title">Loading…</h2>
        <p id="postSubtitle" class="article__subtitle" style="display:none"></p>

        <div class="article__meta">
          <span id="postMeta" class="muted small"></span>

          <!-- Per-article views badge (hits.sh) -->
          <a id="hitsLink"
             class="pill pill--ghost"
             href="#"
             target="_blank"
             rel="noopener"
             style="display:inline-flex; align-items:center; gap:8px;">
            <img id="hitsBadge" alt="Views" style="height:18px;" />
          </a>
        </div>
      </header>

      <div id="postBody" class="article__body">
        <p class="muted">Loading post content…</p>
      </div>

      <section id="relatedArticles" class="related" style="display:none">
        <h3 class="related__title">Related Articles</h3>
        <div id="relatedGrid" class="related__grid"></div>
      </section>
    </article>
  </main>

  <script>
    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function buildMeta(...parts) {
      return parts.filter(Boolean).join(' · ');
    }

    function escapeHtml(s) {
      return String(s || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function load() {
      const slug = getParam("slug");

      // If no slug, show message and hide counter
      if (!slug) {
        document.getElementById("postTitle").textContent = "Missing post slug.";
        document.getElementById("postBody").innerHTML = "<p class='muted'>Open a post from the home page.</p>";
        document.getElementById("hitsLink").style.display = "none";
        return;
      }

      // Wire DE language-switch link now that a valid slug is confirmed
      const deLinkEl = document.getElementById("deLink");
      if (deLinkEl) deLinkEl.href = `../post.html?slug=${encodeURIComponent(slug)}`;

      // --- per-article views badge (hits.sh) ---
      // English articles use a separate key so counters are independent
      const hitKey = `hugomaier.github.io/danny-declassified/en/posts/${slug}.html`;
      const badgeUrl = `https://hits.sh/${encodeURI(hitKey)}.svg?style=flat&label=views`;
      const statsUrl = `https://hits.sh/${encodeURI(hitKey)}/`;
      document.getElementById("hitsBadge").src = badgeUrl;
      document.getElementById("hitsLink").href = statsUrl;

      // Load English posts index
      const indexRes = await fetch("./posts/index.json", { cache: "no-store" });
      const posts = await indexRes.json();
      const post = posts.find(p => p.slug === slug);

      if (!post) {
        document.getElementById("postTitle").textContent = "Post not found.";
        document.getElementById("postBody").innerHTML = "<p class='muted'>This post does not exist (yet).</p>";
        return;
      }

      document.title = `Danny Declassified — ${post.title}`;
      document.getElementById("postTitle").textContent = post.title;

      // Optional subtitle
      const subtitleEl = document.getElementById("postSubtitle");
      if (subtitleEl && post.subtitle) {
        subtitleEl.textContent = post.subtitle;
        subtitleEl.style.display = "";
      }

      // Combined metadata line
      document.getElementById("postMeta").textContent =
        buildMeta(post.category, post.date, post.readTime);

      // Load English post body
      const bodyRes = await fetch(`./posts/${post.slug}.html`, { cache: "no-store" });
      document.getElementById("postBody").innerHTML = await bodyRes.text();

      // Related articles
      const sameCat = posts
        .filter(p => p.slug !== slug && p.category === post.category)
        .slice(0, 3);
      const others = posts
        .filter(p => p.slug !== slug && p.category !== post.category)
        .sort((a, b) => (b.date || "").localeCompare(a.date || ""));
      const related = [...sameCat, ...others.slice(0, 3 - sameCat.length)];

      if (related.length > 0) {
        document.getElementById("relatedArticles").style.display = "";
        const relatedGrid = document.getElementById("relatedGrid");
        related.forEach(r => {
          const a = document.createElement("a");
          a.className = "card related-card";
          a.href = `./post.html?slug=${encodeURIComponent(r.slug)}`;
          a.innerHTML = `
            <h4 class="related-card__title">${escapeHtml(r.title)}</h4>
            <p class="muted small">${escapeHtml(buildMeta(r.category, r.date))}</p>
            ${r.excerpt ? `<p class="related-card__excerpt muted small">${escapeHtml(r.excerpt)}</p>` : ""}
          `;
          relatedGrid.appendChild(a);
        });
      }
    }

    load().catch(err => {
      document.getElementById("postTitle").textContent = "Error loading post.";
      document.getElementById("postBody").innerHTML = `<pre>${String(err)}</pre>`;
    });
  </script>
</body>
</html>
