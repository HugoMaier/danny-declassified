<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Danny Declassified — Post</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="description" content="Berichte, Analysen und Einordnungen — von Danny Declassified." />
  <meta property="og:type"  content="article" />
  <meta property="og:title" content="Danny Declassified" />
  <meta property="og:url"   content="https://hugomaier.github.io/danny-declassified/post.html" />
  <link rel="alternate" hreflang="de" href="https://hugomaier.github.io/danny-declassified/post.html" />
  <link rel="alternate" hreflang="en" href="https://hugomaier.github.io/danny-declassified/en/post.html" />
</head>
<body>
  <div id="readProgress" class="read-progress"></div>
  <header class="site-header">
    <div class="wrap header-row">
      <div class="brand">
        <div class="brand__logo">DD</div>
        <div>
          <h1 class="brand__title">Danny Declassified</h1>
          <p class="brand__tagline">Berichte, Analysen und Einordnungen.</p>
        </div>
      </div>

      <nav class="nav">
        <a href="./index.html" class="nav__link">Übersicht</a>
        <a href="./dossiers.html" class="nav__link">Dossiers</a>
        <span class="nav__lang"><a href="./index.html" class="nav__link nav__link--active nav__link--lang">DE</a><span class="nav__lang-sep">|</span><a id="enLink" href="/en/" class="nav__link nav__link--lang">EN</a></span>
      </nav>
    </div>
  </header>

  <main class="wrap post">
    <a class="back" href="./index.html">← Zurück zur Übersicht</a>

    <article class="article card">
      <header class="article__header">
        <h2 id="postTitle" class="article__title">Lade…</h2>
        <p id="postSubtitle" class="article__subtitle" style="display:none"></p>

        <div class="article__meta">
          <span id="postMeta" class="muted small"></span>
          <button id="shareBtn" class="share-btn" type="button">↗ Teilen</button>
        </div>
      </header>

      <div id="postBody" class="article__body">
        <p class="muted">Artikel wird geladen…</p>
      </div>

      <section id="relatedArticles" class="related" style="display:none">
        <h3 class="related__title">Ähnliche Artikel</h3>
        <div id="relatedGrid" class="related__grid"></div>
      </section>

      <div id="hubRef" class="hub-ref" style="display:none"></div>

      <div class="hits-badge">
        <a id="hitsLink" class="footer-link" href="#" target="_blank" rel="noopener">
          <img id="hitsBadge" alt="Aufrufe" style="height:16px; opacity:0.5;" />
        </a>
      </div>
    </article>
  </main>

  <footer class="wrap footer">
    <span class="muted">© <span id="year"></span> Danny Declassified</span>
    <nav class="footer-nav"><a href="./impressum.html" class="footer-link">Impressum</a></nav>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function buildMeta(...parts) {
      return parts.filter(Boolean).join(' · ');
    }

    function escapeHtml(s) {
      return String(s || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function load() {
      const slug = getParam("slug");

      // If no slug, show message and hide counter
      if (!slug) {
        document.getElementById("postTitle").textContent = "Kein Artikel-Slug angegeben.";
        document.getElementById("postBody").innerHTML = "<p class='muted'>Öffne einen Artikel über die Startseite.</p>";
        document.getElementById("hitsLink").style.display = "none";
        return;
      }

      // Wire EN language-switch link now that a valid slug is confirmed
      const enLinkEl = document.getElementById("enLink");
      if (enLinkEl) enLinkEl.href = `/en/post.html?slug=${encodeURIComponent(slug)}`;

      // --- per-article views badge (hits.sh) ---
      const hitKey = `hugomaier.github.io/danny-declassified/posts/${slug}.html`;
      const badgeUrl = `https://hits.sh/${encodeURI(hitKey)}.svg?style=flat&label=Aufrufe`;
      const statsUrl = `https://hits.sh/${encodeURI(hitKey)}/`;
      document.getElementById("hitsBadge").src = badgeUrl;
      document.getElementById("hitsLink").href = statsUrl;

      // Load posts index
      const indexRes = await fetch("./posts/index.json", { cache: "no-store" });
      const posts = await indexRes.json();
      const post = posts.find(p => p.slug === slug);

      if (!post) {
        document.getElementById("postTitle").textContent = "Artikel nicht gefunden.";
        document.getElementById("postBody").innerHTML = "<p class='muted'>Dieser Artikel existiert (noch) nicht.</p>";
        return;
      }

      document.title = `Danny Declassified — ${post.title}`;
      document.getElementById("postTitle").textContent = post.title;
      document.querySelector('meta[property="og:title"]')?.setAttribute('content', post.title);
      document.querySelector('meta[name="description"]')?.setAttribute('content', post.excerpt || post.title);

      // Optional subtitle
      const subtitleEl = document.getElementById("postSubtitle");
      if (subtitleEl && post.subtitle) {
        subtitleEl.textContent = post.subtitle;
        subtitleEl.style.display = "";
      }

      // Combined metadata line
      document.getElementById("postMeta").textContent =
        buildMeta(post.category, post.date, post.readTime);

      // Load post body
      const bodyRes = await fetch(`./posts/${post.slug}.html`, { cache: "no-store" });
      document.getElementById("postBody").innerHTML = await bodyRes.text();

      // Related articles — priority: explicit > theme-based > category fallback
      const explicit = (post.related || [])
        .map(s => posts.find(p => p.slug === s)).filter(Boolean);
      const themeMatches = posts.filter(p =>
        p.slug !== slug &&
        !explicit.some(e => e.slug === p.slug) &&
        (p.themes || []).some(t => (post.themes || []).includes(t))
      ).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      const catFallback = posts.filter(p =>
        p.slug !== slug &&
        !explicit.some(e => e.slug === p.slug) &&
        !themeMatches.some(t => t.slug === p.slug) &&
        p.category === post.category
      );
      const related = [...explicit, ...themeMatches, ...catFallback].slice(0, 3);

      if (related.length > 0) {
        document.getElementById("relatedArticles").style.display = "";
        const relatedGrid = document.getElementById("relatedGrid");
        related.forEach(r => {
          const a = document.createElement("a");
          a.className = "card related-card";
          a.href = `./post.html?slug=${encodeURIComponent(r.slug)}`;
          a.innerHTML = `
            <h4 class="related-card__title">${escapeHtml(r.title)}</h4>
            <p class="muted small">${escapeHtml(buildMeta(r.category, r.date))}</p>
            ${r.excerpt ? `<p class="related-card__excerpt muted small">${escapeHtml(r.excerpt)}</p>` : ""}
          `;
          relatedGrid.appendChild(a);
        });
      }

      // Hub/Dossier reference
      const THEME_LABELS = {
        'economic-pressure': 'Wirtschaftsdruck, Migration und der Aufstieg der AfD',
        'culture-war': 'Kulturkampf, Klasse und Moralisierung',
        'geopolitics': 'Deutschland in einer härteren geopolitischen Welt'
      };
      if (post.themes && post.themes.length > 0) {
        const hubRefEl = document.getElementById('hubRef');
        if (hubRefEl) {
          const links = post.themes.map(t =>
            `<a href="./hub.html?hub=${encodeURIComponent(t)}" class="hub-ref-link">${escapeHtml(THEME_LABELS[t] || t)}</a>`
          ).join('');
          hubRefEl.innerHTML = `<p class="hub-ref__label">Dieses Essay erscheint auch im Dossier</p><div class="hub-ref__links">${links}</div>`;
          hubRefEl.style.display = '';
        }
      }
    }

    load().catch(err => {
      document.getElementById("postTitle").textContent = "Fehler beim Laden.";
      document.getElementById("postBody").innerHTML = `<pre>${String(err)}</pre>`;
    });

    // Share button
    document.getElementById("shareBtn")?.addEventListener("click", async () => {
      const btn = document.getElementById("shareBtn");
      const url = window.location.href;
      const title = document.getElementById("postTitle")?.textContent || "Danny Declassified";
      try {
        if (navigator.share) {
          await navigator.share({ title, url });
        } else {
          await navigator.clipboard.writeText(url);
          btn.textContent = "✓ Link kopiert";
          btn.classList.add("share-btn--copied");
          setTimeout(() => { btn.textContent = "↗ Teilen"; btn.classList.remove("share-btn--copied"); }, 1800);
        }
      } catch(e) { /* user cancelled */ }
    });
    // Reading progress bar
    window.addEventListener('scroll', () => {
      const el = document.documentElement;
      const pct = el.scrollTop / (el.scrollHeight - el.clientHeight) * 100;
      const bar = document.getElementById('readProgress');
      if (bar) bar.style.width = Math.min(pct, 100) + '%';
    });
  </script>
</body>
</html>
